<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRadar — Rastreador de Precios</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --accent3: #3b82f6;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --green: #22c55e;
    --red: #ef4444;
    --purple: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }

  .logo-text {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.4rem 0.9rem;
    border-radius: 99px;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .sync-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sync-btn:hover { background: #d4eb2a; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,255,71,0.3); }
  .sync-btn:active { transform: translateY(0); }
  .sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .sync-btn .icon { font-size: 1rem; transition: transform 0.4s; }
  .sync-btn.syncing .icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-label {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .stat-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  .data-table th {
    background: var(--surface2);
    padding: 0.8rem 1rem;
    text-align: left;
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid rgba(42,42,56,0.5);
  }

  .data-table tr:hover td { background: rgba(232,255,71,0.03); }

  .portal-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.2rem 0.6rem;
    border-radius: 99px;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
  }

  .price-cell {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--accent);
  }

  .link-btn {
    color: var(--accent3);
    text-decoration: none;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
  }

  .link-btn:hover { color: var(--accent); }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }

  .error-message {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 1rem;
    border-radius: 8px;
    margin: 1rem 0;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚗</div>
    <div class="logo-text">Auto<span>Radar</span></div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Conectando...</span>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="reloadData()">
      <span class="icon">⟳</span>
      Recargar
    </button>
  </div>
</header>

<main>
  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total anuncios</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub" id="statNew">Cargando...</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Portales activos</div>
      <div class="stat-value" id="statPortals">—</div>
      <div class="stat-sub">rastreados</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Precio medio</div>
      <div class="stat-value" id="statAvg">—</div>
      <div class="stat-sub">€</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Más barato</div>
      <div class="stat-value" id="statMin" style="font-size:1.2rem">—</div>
      <div class="stat-sub" id="statMinSub">—</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Marca / Modelo</th>
          <th>Año</th>
          <th>Km</th>
          <th>Precio</th>
          <th>Portal</th>
          <th>Provincia</th>
          <th>Sincronizado</th>
          <th>Ver</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" style="text-align:center; padding:2rem;"><div class="loading">📊 Cargando datos desde Supabase...</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
// ============================================================
// CONFIGURACIÓN SUPABASE
// ============================================================

const SUPABASE_URL = 'https://tingcbepyaqskulrdgiw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpbmdjYmVweWFxc2t1bHJkZ2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTEzODk0NDcsImV4cCI6MjAyNjk2OTQ0N30.YYYs3LlV';

// ============================================================
// CARGA DE DATOS
// ============================================================

async function loadData() {
  try {
    document.getElementById('statusText').textContent = 'Conectando a Supabase...';
    document.getElementById('statusDot').style.background = '#ff6b35';

    // Fetch desde REST API de Supabase
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/coches_anuncios?select=*&order=fecha_sync.desc&limit=100`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    const coches = await response.json();

    if (!coches || coches.length === 0) {
      document.getElementById('tableBody').innerHTML = 
        '<tr><td colspan="8" style="text-align:center; padding:2rem;"><div class="error-message">⚠️ Sin datos en Supabase</div></td></tr>';
      updateStats([]);
      document.getElementById('statusText').textContent = 'En línea (sin datos)';
      return;
    }

    // Actualizar tabla
    renderTable(coches);

    // Actualizar stats
    updateStats(coches);

    document.getElementById('statusText').textContent = 'En línea';
    document.getElementById('statusDot').style.background = '#22c55e';

  } catch (error) {
    console.error('Error cargando datos:', error);
    document.getElementById('tableBody').innerHTML = 
      `<tr><td colspan="8" style="text-align:center; padding:2rem;"><div class="error-message">❌ Error: ${error.message}</div></td></tr>`;
    document.getElementById('statusText').textContent = 'Error de conexión';
    document.getElementById('statusDot').style.background = '#ef4444';
  }
}

function renderTable(coches) {
  const tbody = document.getElementById('tableBody');

  if (coches.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">Sin anuncios</td></tr>';
    return;
  }

  tbody.innerHTML = coches.slice(0, 50).map(coche => {
    const fecha = new Date(coche.fecha_sync);
    const fechaFormato = fecha.toLocaleString('es-ES', { 
      month: 'short', 
      day: 'numeric', 
      hour: '2-digit', 
      minute: '2-digit' 
    });

    return `
      <tr>
        <td><strong>${coche.titulo}</strong></td>
        <td style="font-family:Space Mono,monospace">${coche.year || '—'}</td>
        <td style="font-family:Space Mono,monospace">${coche.km ? coche.km.toLocaleString() + ' km' : '—'}</td>
        <td><span class="price-cell">€${coche.precio.toLocaleString('es-ES')}</span></td>
        <td><span class="portal-pill">${coche.portal}</span></td>
        <td>${coche.lugar || '—'}</td>
        <td style="font-size:0.75rem; color:var(--muted); font-family:Space Mono,monospace">${fechaFormato}</td>
        <td><a href="${coche.link}" target="_blank" class="link-btn">↗</a></td>
      </tr>
    `;
  }).join('');
}

function updateStats(coches) {
  if (coches.length === 0) {
    document.getElementById('statTotal').textContent = '0';
    document.getElementById('statPortals').textContent = '0';
    document.getElementById('statAvg').textContent = '—';
    document.getElementById('statMin').textContent = '—';
    return;
  }

  const total = coches.length;
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  const nuevosHoy = coches.filter(c => new Date(c.fecha_sync) >= hoy).length;
  
  const precios = coches.map(c => c.precio);
  const promedio = precios.reduce((a, b) => a + b, 0) / precios.length;
  const minimo = Math.min(...precios);
  const portales = new Set(coches.map(c => c.portal)).size;

  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statNew').textContent = `+${nuevosHoy} hoy`;
  document.getElementById('statPortals').textContent = portales;
  document.getElementById('statAvg').textContent = Math.round(promedio).toLocaleString('es-ES');
  document.getElementById('statMin').textContent = '€' + minimo.toLocaleString('es-ES');
  
  const cocheMasBarato = coches.find(c => c.precio === minimo);
  document.getElementById('statMinSub').textContent = cocheMasBarato ? cocheMasBarato.titulo : '—';
}

async function reloadData() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  btn.disabled = true;
  
  await loadData();
  
  btn.classList.remove('syncing');
  btn.disabled = false;
}

// ============================================================
// INICIO
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  loadData();
  
  // Recargar cada 2 minutos
  setInterval(loadData, 2 * 60 * 1000);
});
</script>
</body>
</html>
