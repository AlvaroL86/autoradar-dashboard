<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AutoRadar — Dashboard en Vivo</title><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:#2a2a38;--accent:#e8ff47;--accent2:#ff6b35;--accent3:#3b82f6;--text:#f0f0f5;--muted:#6b6b80;--green:#22c55e;--red:#ef4444;}*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);z-index:100;}.logo{display:flex;align-items:center;gap:0.75rem;}.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}.logo-text{font-size:1.3rem;font-weight:800;letter-spacing:-0.5px;}.logo-text span{color:var(--accent);}.header-right{display:flex;align-items:center;gap:1rem;}.status-badge{display:flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);padding:0.4rem 0.9rem;border-radius:99px;font-size:0.75rem;font-family:'Space Mono',monospace;color:var(--muted);}.status-dot{width:7px;height:7px;border-radius:50%;background:#ff6b35;box-shadow:0 0 8px #ff6b35;animation:pulse 1.5s infinite;}.status-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green);}.status-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);animation:none;}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}.sync-btn{display:flex;align-items:center;gap:0.5rem;background:var(--accent);color:#0a0a0f;border:none;padding:0.55rem 1.2rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.2s;}.sync-btn:hover{background:#d4eb2a;transform:translateY(-1px);}.sync-btn:disabled{opacity:0.5;cursor:not-allowed;}main{max-width:1400px;margin:0 auto;padding:2rem;position:relative;z-index:1;}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.5rem;}.stat-label{font-size:0.7rem;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;}.stat-value{font-size:2rem;font-weight:800;letter-spacing:-1px;line-height:1;}.stat-sub{font-size:0.72rem;color:var(--muted);margin-top:0.3rem;}.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}.data-table{width:100%;border-collapse:collapse;font-size:0.82rem;}.data-table th{background:var(--surface2);padding:0.8rem 1rem;text-align:left;font-size:0.65rem;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}.data-table td{padding:0.75rem 1rem;border-bottom:1px solid rgba(42,42,56,0.5);}.data-table tr:hover td{background:rgba(232,255,71,0.03);}.portal-pill{display:inline-flex;align-items:center;gap:0.3rem;background:var(--surface2);border:1px solid var(--border);padding:0.2rem 0.6rem;border-radius:99px;font-size:0.7rem;font-family:'Space Mono',monospace;}.price-cell{font-family:'Space Mono',monospace;font-weight:700;font-size:0.9rem;color:var(--accent);}.link-btn{color:var(--accent3);text-decoration:none;font-size:0.75rem;font-family:'Space Mono',monospace;}.loading{text-align:center;padding:3rem;color:var(--muted);}.error-box{background:rgba(239,68,68,0.1);border:1px solid var(--red);color:var(--red);padding:1rem;border-radius:8px;margin:1rem 0;}.success-box{background:rgba(34,197,94,0.1);border:1px solid var(--green);color:var(--green);padding:1rem;border-radius:8px;margin:1rem 0;}</style></head><body><header><div class="logo"><div class="logo-icon">🚗</div><div class="logo-text">Auto<span>Radar</span></div></div><div class="header-right"><div class="status-badge"><div class="status-dot" id="statusDot"></div><span id="statusText">Conectando...</span></div><button class="sync-btn" id="syncBtn" onclick="reloadData()"><span>⟳</span> Actualizar</button></div></header><main><div class="stats-grid"><div class="stat-card"><div class="stat-label">Total anuncios</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub" id="statNew">Cargando...</div></div><div class="stat-card"><div class="stat-label">Portales activos</div><div class="stat-value" id="statPortals">—</div><div class="stat-sub">de 10</div></div><div class="stat-card"><div class="stat-label">Precio medio</div><div class="stat-value" id="statAvg">—</div><div class="stat-sub">€</div></div><div class="stat-card"><div class="stat-label">Más barato</div><div class="stat-value" id="statMin" style="font-size:1.2rem">—</div><div class="stat-sub" id="statMinSub">—</div></div></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Título</th><th>Año</th><th>Km</th><th>Precio</th><th>Portal</th><th>Provincia</th><th>Sincronizado</th><th>Ver</th></tr></thead><tbody id="tableBody"><tr><td colspan="8" style="text-align:center;"><div class="loading">📊 Cargando datos de Supabase...</div></td></tr></tbody></table></div></main><script>const SUPABASE_URL='https://tingcbepyaqskulrdgiw.supabase.co';const SUPABASE_KEY='sb_publishable_WdJgGgLvt76CgX-vk7jV5w_YYYs3LlV';async function loadData(){try{const dot=document.getElementById('statusDot');const text=document.getElementById('statusText');const tbody=document.getElementById('tableBody');dot.classList.remove('connected','error');text.textContent='Conectando...';const response=await fetch(SUPABASE_URL+'/rest/v1/coches_anuncios?select=*&order=fecha_sync.desc&limit=100',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});if(!response.ok){throw new Error('HTTP '+response.status);}const data=await response.json();if(!data||data.length===0){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;"><div class="success-box">✅ Conectado - Datos disponibles después de las 7 AM UTC</div></td></tr>';updateStats([]);dot.classList.add('connected');text.textContent='En línea (sin datos)';return;}renderTable(data);updateStats(data);dot.classList.add('connected');text.textContent='En línea';}catch(error){console.error(error);document.getElementById('tableBody').innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;"><div class="error-box">❌ Error: '+error.message+'</div></td></tr>';document.getElementById('statusDot').classList.add('error');document.getElementById('statusText').textContent='Error';}}function renderTable(coches){const tbody=document.getElementById('tableBody');if(!coches||coches.length===0)return;tbody.innerHTML=coches.slice(0,100).map(c=>{const fecha=new Date(c.fecha_sync);const fechaFormato=fecha.toLocaleString('es-ES',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});return '<tr><td><strong>'+c.titulo+'</strong></td><td style="font-family:Space Mono,monospace">'+(c.year||'—')+'</td><td style="font-family:Space Mono,monospace">'+(c.km?c.km.toLocaleString()+' km':'—')+'</td><td><span class="price-cell">€'+Math.round(c.precio).toLocaleString('es-ES')+'</span></td><td><span class="portal-pill">'+c.portal+'</span></td><td>'+(c.lugar||'—')+'</td><td style="font-size:0.75rem;color:var(--muted);font-family:Space Mono,monospace">'+fechaFormato+'</td><td><a href="'+c.link+'" target="_blank" class="link-btn">↗</a></td></tr>';}).join('');}function updateStats(coches){if(!coches||coches.length===0){document.getElementById('statTotal').textContent='0';document.getElementById('statPortals').textContent='0';document.getElementById('statAvg').textContent='—';document.getElementById('statMin').textContent='—';return;}const total=coches.length;const precios=coches.filter(c=>c.precio>0).map(c=>c.precio);const promedio=precios.length>0?precios.reduce((a,b)=>a+b,0)/precios.length:0;const minimo=precios.length>0?Math.min(...precios):0;const portales=new Set(coches.map(c=>c.portal)).size;document.getElementById('statTotal').textContent=total.toLocaleString();document.getElementById('statPortals').textContent=portales;document.getElementById('statAvg').textContent=Math.round(promedio).toLocaleString('es-ES');document.getElementById('statMin').textContent='€'+minimo.toLocaleString('es-ES');const cocheMasBarato=coches.find(c=>c.precio===minimo);document.getElementById('statMinSub').textContent=cocheMasBarato?cocheMasBarato.titulo.substring(0,40):'—';}async function reloadData(){const btn=document.getElementById('syncBtn');btn.disabled=true;await loadData();btn.disabled=false;}document.addEventListener('DOMContentLoaded',()=>{loadData();setInterval(loadData,2*60*1000);});</script></body></html>
